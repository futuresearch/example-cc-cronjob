apiVersion: batch/v1
kind: CronJob
metadata:
  name: claudie-add-numbers
spec:
  schedule: "0 8 * * 1-5"            # 8am UTC weekdays
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 7200     # 2 hours hard limit
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: claudie
              image: <your-registry>/claudie:latest
              env:
                - name: SKILL_NAME
                  value: "add-numbers"
                - name: ANTHROPIC_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: claudie-secrets
                      key: ANTHROPIC_API_KEY
              resources:
                requests:
                  cpu: 100m
                  memory: 512Mi
                limits:
                  cpu: 2
                  memory: 4Gi
