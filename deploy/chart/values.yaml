namespace: default

image:
  repository: <your-registry>/claudie
  tag: latest
  pullPolicy: Always

secretName: claudie-secrets

defaults:
  backoffLimit: 1
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  activeDeadlineSeconds: 7200  # 2 hours
  resources:
    limits:
      cpu: 2
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 512Mi

jobs:
  - name: add-numbers
    skillName: add-numbers
    schedule: "0 8 * * 1-5"  # Weekdays at 8am UTC

  - name: community-scanner
    skillName: community-scanner
    schedule: "0 9 * * 1-5"  # Weekdays at 9am UTC

  - name: seo-pipeline
    skillName: seo-pipeline
    schedule: "0 10 * * 1,3,5"  # Mon/Wed/Fri at 10am UTC

  - name: daily-news-content
    skillName: daily-news-content
    schedule: "0 14 * * 1-5"  # Weekdays at 2pm UTC
